<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SCI GTIR Tillage Intensity Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --earth: #3D2F1E;
  --leaf: #2B4028;
  --clay: #A8551F;
  --cream: #FBF8F1;
  --soft: #F6EFE2;
  --line: #DED3BB;
  --muted: #6B6458;
  --ink: #1C1A16;
  --warn: #FFF3D6;
  --white: #FFFFFF;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  background: transparent;
  color: var(--ink);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.35;
}
button, input, select { font: inherit; }
button { touch-action: manipulation; }
.page {
  width: 100%;
  max-width: 980px;
  margin: 0 auto;
  padding: 8px;
}
.card, .crop-shell, .crop-card, .event-card {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--white);
}
.card {
  padding: 12px;
  margin-bottom: 8px;
}
.topbar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
h1, h2, h3 { margin: 0; color: var(--earth); letter-spacing: -.02em; }
h1 { font-size: clamp(18px, 4.2vw, 24px); line-height: 1.08; }
h2 { font-size: 16px; font-weight: 800; }
h3 { font-size: 15px; font-weight: 800; }
.help { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}
.field { min-width: 0; }
label, .label {
  display: block;
  color: var(--muted);
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
input, select {
  width: 100%;
  max-width: 100%;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  color: var(--ink);
  padding: 8px 10px;
  outline: none;
}
input:focus, select:focus {
  border-color: var(--clay);
  box-shadow: 0 0 0 3px rgba(168, 85, 31, .12);
}
.actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.btn {
  border: 0;
  border-radius: 10px;
  padding: 8px 10px;
  min-height: 36px;
  color: #fff;
  background: var(--leaf);
  cursor: pointer;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}
.btn.secondary { background: var(--clay); }
.btn.ghost { background: #fff; color: var(--earth); border: 1px solid var(--line); }
.btn.danger { background: #8D3B1F; }
.btn.icon { width: 36px; padding: 0; font-size: 18px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
}
.metric {
  border: 1px solid var(--line);
  border-radius: 11px;
  background: var(--cream);
  padding: 8px;
  min-width: 0;
}
.metric .value {
  color: var(--earth);
  font-size: 17px;
  font-weight: 850;
  line-height: 1.1;
  overflow-wrap: anywhere;
}
.note {
  border-left: 4px solid var(--clay);
  border-radius: 10px;
  background: var(--warn);
  color: var(--earth);
  padding: 9px 10px;
  margin-bottom: 8px;
  font-size: 12px;
}
.hidden { display: none !important; }
.crop-mini-summary {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-top: 8px;
  scrollbar-width: thin;
}
.crop-mini-pill {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 8px;
  background: #fff;
  color: var(--earth);
  font-size: 11px;
  white-space: nowrap;
}
.crop-mini-pill b { color: var(--leaf); }
.crop-shell {
  padding: 10px;
}
.crop-nav {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.crop-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
}
.crop-tab {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  color: var(--earth);
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
  cursor: pointer;
}
.crop-tab.active { background: var(--leaf); border-color: var(--leaf); color: #fff; }
.crop-controls {
  display: flex;
  gap: 6px;
  align-items: center;
  white-space: nowrap;
}
.crop-page-count { color: var(--muted); font-size: 12px; font-weight: 800; }
.crop-card { display: none; overflow: hidden; }
.crop-card.active-crop { display: block; }
.crop-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 120px auto;
  gap: 8px;
  align-items: end;
  padding: 10px;
  background: var(--cream);
  border-bottom: 1px solid var(--line);
}
.crop-stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--line);
}
.stat {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  padding: 7px;
}
.stat .value { color: var(--leaf); font-size: 15px; font-weight: 850; }
.event-list {
  display: grid;
  gap: 8px;
  padding: 10px;
}
.event-card {
  padding: 10px;
  background: #fff;
}
.event-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.event-title {
  font-size: 12px;
  font-weight: 850;
  color: var(--earth);
  min-width: 0;
}
.event-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
}
.span-2 { grid-column: span 2; }
.readout {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--cream);
  padding: 8px 10px;
  color: var(--earth);
  font-weight: 850;
  display: flex;
  align-items: center;
}
.crop-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 0 10px 10px;
}
#cropGTIRTiles { display: none; }
@media (max-width: 860px) {
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .event-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .span-2 { grid-column: span 2; }
  .crop-head { grid-template-columns: 1fr 1fr; }
  .remove-crop { grid-column: 1 / -1; width: 100%; }
}
@media (max-width: 620px) {
  .page { padding: 6px; }
  .card, .crop-shell { padding: 8px; border-radius: 12px; }
  .topbar, .crop-nav { grid-template-columns: 1fr; }
  .topbar .actions .btn, .crop-actions .btn { width: 100%; }
  .grid, .summary, .crop-stats, .event-grid, .crop-head { grid-template-columns: 1fr; }
  .span-2 { grid-column: span 1; }
  .crop-controls { display: grid; grid-template-columns: 1fr auto 1fr; width: 100%; }
  .crop-controls .btn { width: 100%; }
  input, select { min-height: 40px; font-size: 16px; }
}
@media (max-width: 390px) {
  .crop-controls { grid-template-columns: 1fr; }
  .crop-page-count { text-align: center; }
}
@media print {
  .actions, .crop-controls, .crop-tabs, .remove-crop, .remove-event, .crop-actions { display: none !important; }
  .page { max-width: none; padding: 0; }
  .crop-card { display: block !important; break-inside: avoid; }
}
</style>
</head>
<body>
<div class="page">
  <section class="card">
    <div class="topbar">
      <div>
        <h1>SCI GTIR Tillage Calculator</h1>
        <div class="help">Enter farm acres, add crop pages, then add tillage events for each crop.</div>
      </div>
      <div class="actions"><button class="btn secondary" id="exportCsvBtn" type="button">Export CSV</button></div>
    </div>
    <div class="grid">
      <div class="field"><label for="farmName">Farm Name</label><input id="farmName" placeholder="Example: ABC Farm" /></div>
      <div class="field"><label for="totalAcres">Total Acres</label><input id="totalAcres" type="number" min="0" step="0.01" placeholder="0" inputmode="decimal" /></div>
      <div class="field"><label for="preparedBy">Prepared By</label><input id="preparedBy" placeholder="Optional" /></div>
      <div class="field"><label for="cropCount">Number of Crops</label><input id="cropCount" type="number" min="1" max="10" step="1" value="1" inputmode="numeric" /></div>
    </div>
  </section>

  <section class="card">
    <div class="topbar">
      <div><h2>Quick Summary</h2><div class="help">Compact farm totals and GTIR checks.</div></div>
      <div class="actions"><button class="btn ghost" id="addCropBtn" type="button">Add Crop</button></div>
    </div>
    <div id="acreWarning" class="note hidden"></div>
    <div class="summary">
      <div class="metric"><div class="label">Crop Acres</div><div class="value" id="sumCropAcres">0.00</div></div>
      <div class="metric"><div class="label">Remaining</div><div class="value" id="remainingAcres">0.00</div></div>
      <div class="metric"><div class="label">Farm Avg GTIR</div><div class="value" id="farmAvgGTIR">0.00</div></div>
      <div class="metric"><div class="label">Events</div><div class="value" id="eventCount">0</div></div>
    </div>
    <div class="crop-mini-summary" id="cropMiniSummary"></div>
    <div class="summary" id="cropGTIRTiles"></div>
  </section>

  <section class="crop-shell">
    <div class="crop-nav">
      <div class="crop-tabs" id="cropTabs" aria-label="Crop pages"></div>
      <div class="crop-controls">
        <button class="btn ghost" id="prevCropBtn" type="button">Previous</button>
        <span class="crop-page-count" id="cropPageCount">Crop 1 of 1</span>
        <button class="btn ghost" id="nextCropBtn" type="button">Next</button>
      </div>
    </div>
    <main id="crops"></main>
  </section>
</div>

<template id="cropTemplate">
  <section class="crop-card" data-crop-id="">
    <div class="crop-head">
      <div class="field"><label>Crop Name</label><input class="crop-name" placeholder="Corn, soybeans, wheat..." /></div>
      <div class="field"><label>Crop Acres</label><input class="crop-acres" type="number" min="0" step="0.01" placeholder="0" inputmode="decimal" /></div>
      <button class="btn danger remove-crop" type="button">Remove Crop</button>
    </div>
    <div class="crop-stats">
      <div class="stat"><div class="label">Avg GTIR</div><div class="value crop-avg">0.00</div></div>
      <div class="stat"><div class="label">Total GTIR</div><div class="value crop-total">0.00</div></div>
      <div class="stat"><div class="label">Acres Tilled</div><div class="value crop-tilled">0.00</div></div>
      <div class="stat"><div class="label">Events</div><div class="value crop-events">0</div></div>
    </div>
    <div class="event-list"></div>
    <div class="crop-actions"><button class="btn ghost add-event" type="button">Add Tillage Implement</button></div>
  </section>
</template>

<template id="eventTemplate">
  <section class="event-card event-row">
    <div class="event-top">
      <div class="event-title">Tillage Event</div>
      <button class="btn danger icon remove-event" type="button" aria-label="Remove tillage event">×</button>
    </div>
    <div class="event-grid">
      <div class="field"><label>Tillage Date</label><input class="tillage-date" type="date" /></div>
      <div class="field span-2"><label>Tillage Implement</label><input class="implement" placeholder="Disk, ripper, roller..." /></div>
      <div class="field span-2"><label>Tillage Type</label><select class="tillage-type"><option value="">Select rating type...</option></select></div>
      <div class="field"><label>Rating</label><div class="readout rating">0.00</div></div>
      <div class="field"><label>Depth (in)</label><input class="depth-in" type="number" min="0" step="0.01" placeholder="0" inputmode="decimal" /></div>
      <div class="field"><label>Depth (cm)</label><div class="readout depth-cm">0.00</div></div>
      <div class="field"><label>% Disturbed</label><input class="disturbed" type="number" min="0" max="100" step="0.01" placeholder="100" inputmode="decimal" /></div>
      <div class="field"><label># Passes</label><input class="passes" type="number" min="0" step="0.01" placeholder="1" inputmode="decimal" /></div>
      <div class="field"><label>Acres Tilled</label><div class="readout acres-tilled">0.00</div></div>
      <div class="field"><label>GTIR</label><div class="readout gtir">0.00</div></div>
      <div class="field span-2"><label>Notes</label><input class="notes" placeholder="Optional" /></div>
    </div>
  </section>
</template>

<script>
const TILLAGE_RATINGS = [
  { label: 'Inversion some mixing', rating: 1.0 },
  { label: 'Mixing + some inversion', rating: 0.8 },
  { label: 'Lifting and fracturing', rating: 0.4 },
  { label: 'Mixing only', rating: 0.7 },
  { label: 'Compression', rating: 0.15 }
];
const MAX_CROPS = 10;
let cropCounter = 0;
let activeCropIndex = 0;

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const num = v => Number.isFinite(parseFloat(v)) ? parseFloat(v) : 0;
const fmt = (n, d = 2) => Number.isFinite(n) ? n.toFixed(d) : (0).toFixed(d);

function getCropCards() { return $$('.crop-card'); }

function setActiveCrop(index) {
  const crops = getCropCards();
  if (!crops.length) { activeCropIndex = 0; return; }
  activeCropIndex = Math.max(0, Math.min(index, crops.length - 1));
  crops.forEach((crop, i) => crop.classList.toggle('active-crop', i === activeCropIndex));
  renderCropNavigation();
  requestParentResize();
}

function renderCropNavigation() {
  const crops = getCropCards();
  const tabs = $('#cropTabs');
  const pageCount = $('#cropPageCount');
  if (!tabs || !pageCount) return;
  tabs.innerHTML = '';
  crops.forEach((crop, index) => {
    const name = $('.crop-name', crop)?.value.trim() || `Crop ${index + 1}`;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `crop-tab${index === activeCropIndex ? ' active' : ''}`;
    btn.textContent = name;
    btn.addEventListener('click', () => setActiveCrop(index));
    tabs.appendChild(btn);
  });
  pageCount.textContent = crops.length ? `Crop ${activeCropIndex + 1} of ${crops.length}` : 'No crops';
  $('#prevCropBtn').disabled = activeCropIndex <= 0;
  $('#nextCropBtn').disabled = activeCropIndex >= crops.length - 1;
}

function refreshEventTitles(crop) {
  $$('.event-row', crop).forEach((row, index) => {
    const implement = $('.implement', row).value.trim();
    $('.event-title', row).textContent = implement ? `Event ${index + 1}: ${implement}` : `Tillage Event ${index + 1}`;
  });
}

function createEventRow() {
  const row = $('#eventTemplate').content.firstElementChild.cloneNode(true);
  const select = $('.tillage-type', row);
  TILLAGE_RATINGS.forEach(item => {
    const opt = document.createElement('option');
    opt.value = String(item.rating);
    opt.textContent = `${item.label} (${item.rating})`;
    opt.dataset.label = item.label;
    select.appendChild(opt);
  });
  row.addEventListener('input', calculateAll);
  row.addEventListener('change', calculateAll);
  $('.remove-event', row).addEventListener('click', () => {
    const crop = row.closest('.crop-card');
    const list = row.closest('.event-list');
    if ($$('.event-row', list).length > 1) row.remove();
    else clearEventRow(row);
    refreshEventTitles(crop);
    calculateAll();
  });
  return row;
}

function clearEventRow(row) {
  $$('input', row).forEach(input => input.value = '');
  $('.tillage-type', row).value = '';
}

function desiredCropCount() {
  const input = $('#cropCount');
  let count = Math.round(num(input.value));
  if (!count || count < 1) count = 1;
  if (count > MAX_CROPS) count = MAX_CROPS;
  input.value = String(count);
  return count;
}

function syncCropCardsToCount() {
  const target = desiredCropCount();
  while ($$('.crop-card').length < target) {
    const next = $$('.crop-card').length + 1;
    addCrop(`Crop ${next}`, '');
  }
  while ($$('.crop-card').length > target) {
    const all = $$('.crop-card');
    all[all.length - 1].remove();
  }
  setActiveCrop(Math.min(activeCropIndex, $$('.crop-card').length - 1));
  calculateAll();
}

function addCrop(name = '', acres = '') {
  if ($$('.crop-card').length >= MAX_CROPS) return;
  cropCounter++;
  const crop = $('#cropTemplate').content.firstElementChild.cloneNode(true);
  crop.dataset.cropId = String(cropCounter);
  $('.crop-name', crop).value = name;
  $('.crop-acres', crop).value = acres;
  $('.event-list', crop).appendChild(createEventRow());
  $('.add-event', crop).addEventListener('click', () => {
    $('.event-list', crop).appendChild(createEventRow());
    refreshEventTitles(crop);
    calculateAll();
    requestParentResize();
  });
  $('.remove-crop', crop).addEventListener('click', () => {
    const removedIndex = $$('.crop-card').indexOf(crop);
    crop.remove();
    $('#cropCount').value = String(Math.max(1, $$('.crop-card').length));
    setActiveCrop(Math.min(removedIndex, $$('.crop-card').length - 1));
    calculateAll();
  });
  crop.addEventListener('input', calculateAll);
  crop.addEventListener('change', calculateAll);
  $('#crops').appendChild(crop);
  setActiveCrop($$('.crop-card').length - 1);
  calculateAll();
}

function getEventData(crop, row) {
  const cropName = $('.crop-name', crop).value.trim();
  const cropAcres = num($('.crop-acres', crop).value);
  const tillageDate = $('.tillage-date', row).value;
  const implement = $('.implement', row).value.trim();
  const select = $('.tillage-type', row);
  const rating = num(select.value);
  const tillageType = select.selectedOptions[0]?.dataset.label || '';
  const depthIn = num($('.depth-in', row).value);
  const depthCm = depthIn * 2.54;
  const disturbedPct = Math.min(100, Math.max(0, num($('.disturbed', row).value)));
  const disturbedFraction = disturbedPct / 100;
  const passes = num($('.passes', row).value);
  const acresTilled = cropAcres * disturbedFraction;
  const isComplete = cropName && implement && tillageType && depthIn > 0 && disturbedPct > 0 && passes > 0;
  const gtir = isComplete ? rating * 3.25 * depthCm * disturbedFraction * passes : 0;
  return { cropName, cropAcres, tillageDate, implement, tillageType, rating, depthIn, depthCm, disturbedPct, disturbedFraction, passes, acresTilled: isComplete ? acresTilled : 0, gtir, notes: $('.notes', row).value.trim(), isComplete };
}

function calculateAll() {
  const crops = $$('.crop-card');
  if (activeCropIndex >= crops.length) activeCropIndex = Math.max(0, crops.length - 1);
  crops.forEach((crop, i) => crop.classList.toggle('active-crop', i === activeCropIndex));
  let sumCropAcres = 0;
  let totalEvents = 0;
  let weightedGTIR = 0;
  let weightedAcres = 0;

  crops.forEach(crop => {
    const cropAcres = num($('.crop-acres', crop).value);
    sumCropAcres += cropAcres;
    let cropGTIRTotal = 0;
    let cropEventCount = 0;
    let cropAcresTilled = 0;

    refreshEventTitles(crop);
    $$('.event-row', crop).forEach(row => {
      const e = getEventData(crop, row);
      $('.rating', row).textContent = fmt(e.rating, 2);
      $('.depth-cm', row).textContent = fmt(e.depthCm, 2);
      $('.acres-tilled', row).textContent = fmt(e.acresTilled, 2);
      $('.gtir', row).textContent = fmt(e.gtir, 2);
      if (e.isComplete) {
        cropGTIRTotal += e.gtir;
        cropEventCount++;
        cropAcresTilled += e.acresTilled;
      }
    });

    const cropAvg = cropEventCount ? cropGTIRTotal / cropEventCount : 0;
    $('.crop-avg', crop).textContent = fmt(cropAvg);
    $('.crop-total', crop).textContent = fmt(cropGTIRTotal);
    $('.crop-tilled', crop).textContent = fmt(cropAcresTilled);
    $('.crop-events', crop).textContent = String(cropEventCount);

    if (cropAcres > 0 && cropEventCount > 0) {
      weightedGTIR += cropAvg * cropAcres;
      weightedAcres += cropAcres;
    }
    totalEvents += cropEventCount;
  });

  const totalAcres = num($('#totalAcres').value);
  const remaining = totalAcres - sumCropAcres;
  $('#sumCropAcres').textContent = fmt(sumCropAcres);
  $('#remainingAcres').textContent = fmt(remaining);
  $('#farmAvgGTIR').textContent = fmt(weightedAcres ? weightedGTIR / weightedAcres : 0);
  $('#eventCount').textContent = String(totalEvents);
  $('#addCropBtn').disabled = crops.length >= MAX_CROPS;

  const tiles = $('#cropGTIRTiles');
  tiles.innerHTML = '';
  const mini = $('#cropMiniSummary');
  mini.innerHTML = '';
  crops.forEach((crop, index) => {
    const cropName = $('.crop-name', crop).value.trim() || `Crop ${index + 1}`;
    const cropAcres = num($('.crop-acres', crop).value);
    const cropAvg = $('.crop-avg', crop).textContent;
    const cropTotal = $('.crop-total', crop).textContent;
    const events = $('.crop-events', crop).textContent;

    const tile = document.createElement('div');
    tile.className = 'metric crop-gtir-tile';
    tile.innerHTML = `<div class="label"></div><div class="value"></div>`;
    $('.label', tile).textContent = `${cropName} Avg GTIR`;
    $('.value', tile).textContent = cropAvg;
    tiles.appendChild(tile);

    const pill = document.createElement('button');
    pill.type = 'button';
    pill.className = 'crop-mini-pill';
    pill.innerHTML = '';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = `${cropName}: `;
    const val = document.createElement('b');
    val.textContent = cropAvg;
    pill.appendChild(nameSpan);
    pill.appendChild(val);
    pill.title = `${fmt(cropAcres)} acres • Total GTIR ${cropTotal} • ${events} events`;
    pill.addEventListener('click', () => setActiveCrop(index));
    mini.appendChild(pill);
  });
  renderCropNavigation();

  const warn = $('#acreWarning');
  if (totalAcres > 0 && Math.abs(remaining) > 0.01) {
    warn.classList.remove('hidden');
    warn.textContent = remaining > 0
      ? `Crop acres are ${fmt(remaining)} acres below total farm acres.`
      : `Crop acres exceed total farm acres by ${fmt(Math.abs(remaining))} acres.`;
  } else {
    warn.classList.add('hidden');
    warn.textContent = '';
  }
  requestParentResize();
}

function csvEscape(value) {
  const s = String(value ?? '');
  return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

function buildCsv() {
  calculateAll();
  const rows = [];
  const farmName = $('#farmName').value.trim();
  const preparedBy = $('#preparedBy').value.trim();
  const totalAcres = num($('#totalAcres').value);
  const cropAcresEntered = $('#sumCropAcres').textContent;
  const remainingAcres = $('#remainingAcres').textContent;
  const farmAvgGTIR = $('#farmAvgGTIR').textContent;

  rows.push(['GTIR Tillage Summary']);
  rows.push(['Farm Name', farmName]);
  rows.push(['Prepared By', preparedBy]);
  rows.push(['Total Farm Acres', totalAcres]);
  rows.push(['Crop Acres Entered', cropAcresEntered]);
  rows.push(['Remaining Acres', remainingAcres]);
  rows.push(['Farm Average GTIR', farmAvgGTIR]);
  rows.push([]);
  rows.push(['Crop Name','Crop Acres','Crop Avg GTIR','Crop Total GTIR','Tillage Date','Implement','Tillage Type','Rating','Depth (in)','Depth (cm)','Disturbed (%)','Passes','Acres Tilled','Event GTIR','Notes']);

  $$('.crop-card').forEach(crop => {
    const cropName = $('.crop-name', crop).value.trim();
    const cropAcres = $('.crop-acres', crop).value;
    const cropAvg = $('.crop-avg', crop).textContent;
    const cropTotal = $('.crop-total', crop).textContent;
    let wroteAnyEvent = false;

    $$('.event-row', crop).forEach(row => {
      const e = getEventData(crop, row);
      const hasEventEntry = e.tillageDate || e.implement || e.tillageType || e.depthIn > 0 || e.disturbedPct > 0 || e.passes > 0 || e.notes;
      if (!cropName && !cropAcres && !hasEventEntry) return;
      wroteAnyEvent = true;
      rows.push([cropName, cropAcres, cropAvg, cropTotal, e.tillageDate, e.implement, e.tillageType, fmt(e.rating), e.depthIn, fmt(e.depthCm), e.disturbedPct, e.passes, fmt(e.acresTilled), fmt(e.gtir), e.notes]);
    });

    if (!wroteAnyEvent && (cropName || cropAcres)) rows.push([cropName, cropAcres, cropAvg, cropTotal, '', '', '', '', '', '', '', '', '', '', '']);
  });
  return rows.map(r => r.map(csvEscape).join(',')).join('\n');
}

function downloadCsv() {
  const csv = buildCsv();
  const farm = ($('#farmName').value.trim() || 'Farm').replace(/[^a-z0-9-_]+/gi, '-').replace(/^-|-$/g, '');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${farm}-GTIR-Tillage-Intensity.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function requestParentResize() {
  window.clearTimeout(requestParentResize._timer);
  requestParentResize._timer = window.setTimeout(() => {
    const height = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
    try { window.parent.postMessage({ type: 'sci-calculator-height', height }, '*'); } catch (e) {}
  }, 60);
}

$('#addCropBtn').addEventListener('click', () => {
  const current = $$('.crop-card').length;
  if (current < MAX_CROPS) {
    $('#cropCount').value = String(current + 1);
    syncCropCardsToCount();
  }
});
$('#exportCsvBtn').addEventListener('click', downloadCsv);
$('#prevCropBtn').addEventListener('click', () => setActiveCrop(activeCropIndex - 1));
$('#nextCropBtn').addEventListener('click', () => setActiveCrop(activeCropIndex + 1));
['farmName','totalAcres','preparedBy'].forEach(id => document.getElementById(id).addEventListener('input', calculateAll));
document.getElementById('cropCount').addEventListener('input', syncCropCardsToCount);
document.getElementById('cropCount').addEventListener('change', syncCropCardsToCount);
window.addEventListener('load', requestParentResize);
window.addEventListener('resize', requestParentResize);

syncCropCardsToCount();
</script>
</body>
</html>
